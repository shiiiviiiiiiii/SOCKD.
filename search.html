<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOCKD. | SEARCH</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .search-area {
            background-color: var(--hot-pink);
            padding: 4rem 2rem;
            border-bottom: var(--border-thick);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .huge-search-form {
            width: 100%;
            max-width: 800px;
            display: flex;
            box-shadow: 12px 12px 0px var(--black);
        }

        .huge-search-input {
            flex-grow: 1;
            padding: 1.5rem 2rem;
            font-size: 2rem;
            font-family: var(--font-heading);
            border: var(--border-thick);
            border-right: none;
            outline: none;
        }

        .huge-search-btn {
            background: var(--neon-yellow);
            border: var(--border-thick);
            padding: 0 3rem;
            font-size: 2rem;
            font-family: var(--font-heading);
            cursor: pointer;
            transition: background 0.2s;
        }

        .huge-search-btn:hover {
            background: var(--white);
        }

        .search-meta {
            padding: 2rem;
            font-size: 1.5rem;
            font-family: var(--font-heading);
            border-bottom: var(--border-thick);
            text-align: center;
        }

        /* Shop layout reused from categories */
        .shop-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 80vh;
        }

        .filter-sidebar {
            padding: 2rem;
            border-right: var(--border-thick);
            background-color: var(--light-gray);
        }

        .filter-section { margin-bottom: 2rem; }
        .filter-section h4 { margin-bottom: 1rem; font-size: 1.25rem; border-bottom: 2px solid var(--black); padding-bottom: 0.5rem; }
        .filter-label { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; cursor: pointer; }
        
        .color-swatch-container { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .color-swatch { width: 32px; height: 32px; border: var(--border-thick); cursor: pointer; transition: transform 0.2s; }
        .color-swatch.selected { outline: 3px solid var(--neon-green); outline-offset: 2px; }
        .color-swatch:hover { transform: scale(1.1); }

        .product-grid-area { padding: 2rem; }

        input[type=range] { width: 100%; -webkit-appearance: none; appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; height: 24px; width: 24px; background: var(--black); cursor: pointer; margin-top: -10px; border-radius: 0; border: 2px solid var(--neon-green); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: var(--black); }

        .no-results {
            grid-column: 1 / -1;
            background: var(--black);
            color: var(--neon-yellow);
            padding: 6rem 2rem;
            text-align: center;
            border: var(--border-thick);
        }

        @media (max-width: 900px) {
            .shop-layout { grid-template-columns: 1fr; }
            .filter-sidebar { border-right: none; border-bottom: var(--border-thick); display: flex; flex-wrap: wrap; gap: 2rem; }
            .filter-section { flex: 1; min-width: 200px; margin-bottom: 0; }
            .huge-search-input { font-size: 1.25rem; }
            .huge-search-btn { font-size: 1.25rem; padding: 0 1.5rem; }
        }
    </style>
</head>
<body>

    <div id="global-header"></div>

    <section class="search-area">
        <form class="huge-search-form" id="search-form" action="search.html" method="GET">
            <input type="text" name="q" class="huge-search-input" id="search-input" placeholder="SEARCH SOCKS, LACES..." required>
            <button type="submit" class="huge-search-btn">GO</button>
        </form>
    </section>

    <div class="search-meta" id="search-meta">
        <!-- Injected by JS -->
    </div>

    <div class="shop-layout">
        <aside class="filter-sidebar">
            <div class="filter-section">
                <h4>SORT BY</h4>
                <select id="sort-select" class="brutal-input">
                    <option value="relevant">Most Relevant</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                </select>
            </div>

            <div class="filter-section">
                <h4>MAX PRICE: ₹<span id="price-val">2000</span></h4>
                <input type="range" id="price-slider" min="0" max="2000" step="50" value="2000">
            </div>

            <div class="filter-section">
                <h4>COLOR</h4>
                <div class="color-swatch-container" id="color-filters"></div>
            </div>

            <div class="filter-section">
                <h4>SIZE</h4>
                <div id="size-filters"></div>
            </div>
            
            <button class="brutal-btn" style="width: 100%; margin-top: 1rem; background: var(--white);" id="reset-filters">CLEAR FILTERS</button>
        </aside>

        <main class="product-grid-area">
            <div class="grid-3" id="product-grid">
                <!-- Products injected by JS -->
            </div>
            
            <!-- Suggested products container (hidden by default) -->
            <div id="suggested-container" style="display: none; margin-top: 4rem;">
                <h3 style="font-size: 2rem; border-bottom: 2px solid var(--black); margin-bottom: 2rem; padding-bottom: 1rem;">MAYBE THESE INSTEAD?</h3>
                <div class="grid-3" id="suggested-grid"></div>
            </div>
        </main>
    </div>

    <div id="global-footer"></div>

    <script src="products.js"></script>
    <script src="global.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('product-grid');
            const suggestedContainer = document.getElementById('suggested-container');
            const suggestedGrid = document.getElementById('suggested-grid');
            const meta = document.getElementById('search-meta');
            const searchInput = document.getElementById('search-input');
            
            const sortSelect = document.getElementById('sort-select');
            const priceSlider = document.getElementById('price-slider');
            const priceVal = document.getElementById('price-val');
            const colorContainer = document.getElementById('color-filters');
            const sizeContainer = document.getElementById('size-filters');

            // Parse URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            let query = urlParams.get('q') || '';
            query = query.trim().toLowerCase();
            searchInput.value = urlParams.get('q') || ''; // keep original case for display

            let currentFilter = {
                maxPrice: 2000,
                color: null,
                size: null,
                sort: 'relevant'
            };

            // Extract unique colors and sizes
            const allColors = new Set();
            const allSizes = new Set();
            products.forEach(p => {
                if (p.colors) p.colors.forEach(c => allColors.add(c));
                if (p.sizes) p.sizes.forEach(s => allSizes.add(s));
            });

            allColors.forEach(color => {
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch';
                swatch.style.backgroundColor = color;
                swatch.addEventListener('click', () => {
                    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
                    if (currentFilter.color === color) {
                        currentFilter.color = null;
                    } else {
                        currentFilter.color = color;
                        swatch.classList.add('selected');
                    }
                    renderGrid();
                });
                colorContainer.appendChild(swatch);
            });

            allSizes.forEach(size => {
                const label = document.createElement('label');
                label.className = 'filter-label';
                label.innerHTML = `<input type="radio" name="size-filter" value="${size}" style="accent-color: var(--neon-yellow); width: 1.2rem; height: 1.2rem;"> ${size}`;
                label.querySelector('input').addEventListener('change', (e) => {
                    currentFilter.size = e.target.value;
                    renderGrid();
                });
                sizeContainer.appendChild(label);
            });

            sortSelect.addEventListener('change', (e) => { currentFilter.sort = e.target.value; renderGrid(); });
            priceSlider.addEventListener('input', (e) => { priceVal.textContent = e.target.value; currentFilter.maxPrice = parseInt(e.target.value); renderGrid(); });
            
            document.getElementById('reset-filters').addEventListener('click', () => {
                currentFilter = { maxPrice: 2000, color: null, size: null, sort: 'relevant' };
                priceSlider.value = 2000;
                priceVal.textContent = 2000;
                sortSelect.value = 'relevant';
                document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
                document.querySelectorAll('input[name="size-filter"]').forEach(i => i.checked = false);
                renderGrid();
            });

            function renderCard(product, container) {
                const card = document.createElement('div');
                card.className = 'brutal-card';
                const bgColor = product.colors && product.colors.length > 0 ? product.colors[0] : 'var(--light-gray)';
                card.innerHTML = `
                    <div class="brutal-card-img" style="background-color: ${bgColor};">
                        <img src="${product.images[0]}" alt="${product.name}">
                    </div>
                    <div class="brutal-card-body">
                        <span class="brutal-tag">${product.category}</span>
                        <h3 style="font-size: 1.2rem; margin-bottom: 0.5rem;"><a href="product.html?id=${product.id}">${product.name}</a></h3>
                        <div class="price-block">
                            <span class="price">₹${product.price}</span>
                            ${product.originalPrice > product.price ? `<span class="price-original">₹${product.originalPrice}</span>` : ''}
                        </div>
                        <button class="brutal-btn" style="margin-top: 1.5rem; width: 100%; border-width: 2px;" onclick="addToCartEvent(${product.id})">ADD TO CART</button>
                    </div>
                `;
                container.appendChild(card);
            }

            function renderGrid() {
                grid.innerHTML = '';
                suggestedContainer.style.display = 'none';
                suggestedGrid.innerHTML = '';
                
                if (!query) {
                    meta.textContent = "ENTER A SEARCH TERM.";
                    return;
                }

                // Filter by query
                let matches = products.filter(p => {
                    return p.name.toLowerCase().includes(query) || 
                           p.description.toLowerCase().includes(query) ||
                           p.category.toLowerCase().includes(query);
                });

                // Apply side filters
                let finalMatches = matches.filter(p => {
                    const matchPrice = p.price <= currentFilter.maxPrice;
                    const matchColor = !currentFilter.color || (p.colors && p.colors.includes(currentFilter.color));
                    const matchSize = !currentFilter.size || (p.sizes && p.sizes.includes(currentFilter.size));
                    return matchPrice && matchColor && matchSize;
                });

                // Sort
                if (currentFilter.sort === 'price-low') {
                    finalMatches.sort((a, b) => a.price - b.price);
                } else if (currentFilter.sort === 'price-high') {
                    finalMatches.sort((a, b) => b.price - a.price);
                }

                meta.innerHTML = `<span style="color: var(--hot-pink);">${finalMatches.length}</span> RESULTS FOR "${searchInput.value}"`;

                if (finalMatches.length === 0) {
                    grid.innerHTML = `
                        <div class="no-results">
                            <h2 style="font-size: 3rem; margin-bottom: 1rem;">NO RESULTS FOUND.</h2>
                            <p style="font-size: 1.5rem;">Try something else. Or don't.</p>
                        </div>
                    `;
                    
                    // Show suggestions
                    suggestedContainer.style.display = 'block';
                    products.slice(0, 3).forEach(p => renderCard(p, suggestedGrid));
                    return;
                }

                finalMatches.forEach(product => renderCard(product, grid));
            }

            window.addToCartEvent = function(productId) {
                const product = products.find(p => p.id === productId);
                if (product) {
                    GlobalState.addToCart(product);
                }
            };
            
            renderGrid();
        });
    </script>
</body>
</html>
