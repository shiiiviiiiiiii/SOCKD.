<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOCKD. | SHOP</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .page-header {
            padding: 4rem 2rem;
            background-color: var(--neon-yellow);
            border-bottom: var(--border-thick);
            text-align: center;
        }

        .category-tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .cat-tab {
            padding: 0.5rem 1.5rem;
            font-family: var(--font-heading);
            font-size: 1.25rem;
            background: var(--white);
            border: var(--border-thick);
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--black);
            transition: all 0.2s;
        }

        .cat-tab.active, .cat-tab:hover {
            background: var(--black);
            color: var(--neon-yellow);
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--neon-yellow);
        }

        .shop-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 80vh;
        }

        .filter-sidebar {
            padding: 2rem;
            border-right: var(--border-thick);
            background-color: var(--light-gray);
        }

        .filter-section {
            margin-bottom: 2rem;
        }
        
        .filter-section h4 {
            margin-bottom: 1rem;
            font-size: 1.25rem;
            border-bottom: 2px solid var(--black);
            padding-bottom: 0.5rem;
        }

        .filter-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            font-family: var(--font-body);
            cursor: pointer;
        }

        .color-swatch-container {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .color-swatch {
            width: 32px;
            height: 32px;
            border: var(--border-thick);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .color-swatch.selected {
            outline: 3px solid var(--hot-pink);
            outline-offset: 2px;
        }

        .color-swatch:hover {
            transform: scale(1.1);
        }

        .product-grid-area {
            padding: 2rem;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 4rem;
        }

        .page-node {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: var(--border-thick);
            font-family: var(--font-heading);
            font-size: 1.25rem;
            background: var(--white);
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--black);
        }

        .page-node.active {
            background: var(--neon-green);
            transform: translate(4px, 4px);
            box-shadow: none;
        }
        
        /* Range slider styling */
        input[type=range] {
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            height: 24px;
            width: 24px;
            background: var(--black);
            cursor: pointer;
            margin-top: -10px;
            border-radius: 0;
            border: 2px solid var(--neon-green);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: var(--black);
        }

        @media (max-width: 900px) {
            .shop-layout {
                grid-template-columns: 1fr;
            }
            .filter-sidebar {
                border-right: none;
                border-bottom: var(--border-thick);
                display: flex;
                flex-wrap: wrap;
                gap: 2rem;
            }
            .filter-section {
                flex: 1;
                min-width: 200px;
                margin-bottom: 0;
            }
        }
    </style>
</head>
<body>

    <div id="global-header"></div>

    <section class="page-header">
        <h1 style="font-size: clamp(3rem, 6vw, 5rem);">SHOP ALL</h1>
        <div class="category-tabs" id="cat-tabs">
            <button class="cat-tab active" data-cat="ALL">ALL</button>
            <button class="cat-tab" data-cat="SOCKS">SOCKS</button>
            <button class="cat-tab" data-cat="LACES">LACES</button>
            <button class="cat-tab" data-cat="INSOLES">INSOLES</button>
            <button class="cat-tab" data-cat="ACCESSORIES">ACCESSORIES</button>
        </div>
    </section>

    <div class="shop-layout">
        <!-- Sidebar -->
        <aside class="filter-sidebar">
            <div class="filter-section">
                <h4>SORT BY</h4>
                <select id="sort-select" class="brutal-input">
                    <option value="newest">Newest First</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                    <option value="popular">Most Popular</option>
                </select>
            </div>

            <div class="filter-section">
                <h4>MAX PRICE: ₹<span id="price-val">2000</span></h4>
                <input type="range" id="price-slider" min="0" max="2000" step="50" value="2000">
            </div>

            <div class="filter-section">
                <h4>COLOR</h4>
                <div class="color-swatch-container" id="color-filters">
                    <!-- Injected by JS -->
                </div>
            </div>

            <div class="filter-section">
                <h4>SIZE</h4>
                <div id="size-filters">
                    <!-- Injected by JS -->
                </div>
            </div>
            
            <button class="brutal-btn primary" style="width: 100%; margin-top: 1rem;" id="reset-filters">CLEAR FILTERS</button>
        </aside>

        <!-- Product Grid -->
        <main class="product-grid-area">
            <div class="grid-3" id="product-grid">
                <!-- Products injected by JS -->
            </div>
            
            <div class="pagination">
                <button class="page-node active">1</button>
                <button class="page-node">2</button>
                <button class="page-node">3</button>
                <button class="page-node">&rarr;</button>
            </div>
        </main>
    </div>

    <div id="global-footer"></div>

    <script src="products.js"></script>
    <script src="global.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('product-grid');
            const catTabs = document.querySelectorAll('.cat-tab');
            const sortSelect = document.getElementById('sort-select');
            const priceSlider = document.getElementById('price-slider');
            const priceVal = document.getElementById('price-val');
            const colorContainer = document.getElementById('color-filters');
            const sizeContainer = document.getElementById('size-filters');
            
            let currentFilter = {
                category: 'ALL',
                maxPrice: 2000,
                color: null,
                size: null,
                sort: 'newest'
            };

            // Parse URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const catParam = urlParams.get('category');
            if (catParam) {
                currentFilter.category = catParam.toUpperCase();
                // Update tabs
                catTabs.forEach(t => t.classList.remove('active'));
                const activeTab = document.querySelector(`.cat-tab[data-cat="${currentFilter.category}"]`);
                if (activeTab) activeTab.classList.add('active');
            }

            // Extract unique colors and sizes from products
            const allColors = new Set();
            const allSizes = new Set();
            products.forEach(p => {
                if (p.colors) p.colors.forEach(c => allColors.add(c));
                if (p.sizes) p.sizes.forEach(s => allSizes.add(s));
            });

            // Populate Color Swatches
            allColors.forEach(color => {
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch';
                swatch.style.backgroundColor = color;
                swatch.dataset.color = color;
                swatch.addEventListener('click', () => {
                    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
                    if (currentFilter.color === color) {
                        currentFilter.color = null; // deselect
                    } else {
                        currentFilter.color = color;
                        swatch.classList.add('selected');
                    }
                    renderGrid();
                });
                colorContainer.appendChild(swatch);
            });

            // Populate Size Checkboxes
            allSizes.forEach(size => {
                const label = document.createElement('label');
                label.className = 'filter-label';
                label.innerHTML = `
                    <input type="radio" name="size-filter" value="${size}" style="accent-color: var(--hot-pink); width: 1.2rem; height: 1.2rem;">
                    ${size}
                `;
                label.querySelector('input').addEventListener('change', (e) => {
                    currentFilter.size = e.target.value;
                    renderGrid();
                });
                sizeContainer.appendChild(label);
            });

            // Event Listeners
            catTabs.forEach(tab => {
                tab.addEventListener('click', (e) => {
                    catTabs.forEach(t => t.classList.remove('active'));
                    e.target.classList.add('active');
                    currentFilter.category = e.target.dataset.cat;
                    // Update URL (without refreshing)
                    const url = new URL(window.location);
                    if (currentFilter.category === "ALL") {
                        url.searchParams.delete('category');
                    } else {
                        url.searchParams.set('category', currentFilter.category);
                    }
                    window.history.pushState({}, '', url);
                    renderGrid();
                });
            });

            sortSelect.addEventListener('change', (e) => {
                currentFilter.sort = e.target.value;
                renderGrid();
            });

            priceSlider.addEventListener('input', (e) => {
                priceVal.textContent = e.target.value;
                currentFilter.maxPrice = parseInt(e.target.value);
                renderGrid();
            });
            
            document.getElementById('reset-filters').addEventListener('click', () => {
                currentFilter = { category: 'ALL', maxPrice: 2000, color: null, size: null, sort: 'newest' };
                priceSlider.value = 2000;
                priceVal.textContent = 2000;
                sortSelect.value = 'newest';
                document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
                document.querySelectorAll('input[name="size-filter"]').forEach(i => i.checked = false);
                catTabs.forEach(t => t.classList.remove('active'));
                document.querySelector('.cat-tab[data-cat="ALL"]').classList.add('active');
                
                const url = new URL(window.location);
                url.searchParams.delete('category');
                window.history.pushState({}, '', url);
                
                renderGrid();
            });

            function renderGrid() {
                grid.innerHTML = '';
                
                // Filter
                let filtered = products.filter(p => {
                    const matchCat = currentFilter.category === 'ALL' || p.category === currentFilter.category;
                    const matchPrice = p.price <= currentFilter.maxPrice;
                    const matchColor = !currentFilter.color || (p.colors && p.colors.includes(currentFilter.color));
                    const matchSize = !currentFilter.size || (p.sizes && p.sizes.includes(currentFilter.size));
                    return matchCat && matchPrice && matchColor && matchSize;
                });

                // Sort
                if (currentFilter.sort === 'price-low') {
                    filtered.sort((a, b) => a.price - b.price);
                } else if (currentFilter.sort === 'price-high') {
                    filtered.sort((a, b) => b.price - a.price);
                } else if (currentFilter.sort === 'popular') {
                    filtered.sort((a, b) => b.rating - a.rating);
                } else {
                    // Newest theoretically uses id descending
                    filtered.sort((a, b) => b.id - a.id);
                }

                if (filtered.length === 0) {
                    grid.innerHTML = `
                        <div style="grid-column: 1 / -1; text-align: center; padding: 4rem; border: var(--border-thick); background: var(--light-gray);">
                            <h2>NO PRODUCTS FOUND.</h2>
                            <p>Try adjusting your filters.</p>
                        </div>
                    `;
                    return;
                }

                filtered.forEach(product => {
                    const card = document.createElement('div');
                    card.className = 'brutal-card';
                    // We assume product.colors[0] is the primary color for the background
                    const bgColor = product.colors && product.colors.length > 0 ? product.colors[0] : 'var(--light-gray)';
                    card.innerHTML = `
                        <div class="brutal-card-img" style="background-color: ${bgColor};">
                            <img src="${product.images[0]}" alt="${product.name}" loading="lazy">
                        </div>
                        <div class="brutal-card-body">
                            <span class="brutal-tag">${product.category}</span>
                            <h3 style="font-size: 1.2rem; margin-bottom: 0.5rem;">
                                <a href="product.html?id=${product.id}">${product.name}</a>
                            </h3>
                            <div class="price-block">
                                <span class="price ${product.originalPrice > product.price ? 'sale' : ''}">₹${product.price}</span>
                                ${product.originalPrice > product.price ? `<span class="price-original">₹${product.originalPrice}</span>` : ''}
                            </div>
                            <button class="brutal-btn" style="margin-top: 1.5rem; width: 100%; border-width: 2px;" onclick="addToCartEvent(${product.id})">ADD TO CART</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }

            // Initial render
            window.addToCartEvent = function(productId) {
                const product = products.find(p => p.id === productId);
                if (product) {
                    GlobalState.addToCart(product);
                }
            };
            
            renderGrid();
        });
    </script>
</body>
</html>
